    <style>
        /* CSS RESET */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            font-size: 16px;
            scroll-behavior: smooth;
            -webkit-text-size-adjust: 100%;
        }
        body {
            font-family: 'Noto Sans KR', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0a0a0a;
            color: #e0e0e0;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* TYPOGRAPHY & SPACING */
        h1, h2, h3, h4, h5, h6 {
            font-weight: 700;
            letter-spacing: -0.02em;
            text-transform: uppercase;
        }
        h1 {
            font-size: clamp(2.2rem, 6vw, 3.8rem);
            line-height: 1.1;
            margin-bottom: 1.2rem;
            color: #f0f0f0;
            border-left: 6px solid #ff0055;
            padding-left: 1rem;
        }
        h2 {
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            margin: 2rem 0 1rem;
            color: #ff0055;
            border-bottom: 2px solid #ff0055;
            padding-bottom: 0.3rem;
        }
        h3 {
            font-size: clamp(1.2rem, 3vw, 1.6rem);
            margin: 1.5rem 0 0.8rem;
            color: #c0c0c0;
        }
        p {
            margin-bottom: 1.2rem;
            font-size: 1rem;
            color: #b0b0b0;
        }
        a {
            color: #00e5ff;
            text-decoration: none;
            border-bottom: 1px solid rgba(0,229,255,0.3);
            transition: color 0.2s, border-color 0.2s;
        }
        a:hover {
            color: #ff0055;
            border-bottom-color: #ff0055;
        }
        /* LAYOUT */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
            width: 100%;
        }
        /* HEADER */
        header {
            background: #141414;
            border-bottom: 3px solid #ff0055;
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .logo a {
            color: #f0f0f0;
            border-bottom: none;
        }
        .logo a:hover {
            color: #ff0055;
        }
        /* NAV - 패턴 nav-present */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        nav ul {
            list-style: none;
            display: flex;
            gap: 1.2rem;
            flex-wrap: wrap;
        }
        nav ul li a {
            color: #b0b0b0;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            border-bottom: 2px solid transparent;
            padding-bottom: 0.2rem;
            transition: all 0.2s;
        }
        nav ul li a:hover,
        nav ul li a.active {
            color: #ff0055;
            border-bottom-color: #ff0055;
        }
        /* HERO SECTION (정보 페이지 타이틀 영역) */
        .info-hero {
            padding: 3rem 0 2rem;
            border-bottom: 1px solid #2a2a2a;
        }
        .info-hero p {
            font-size: 1.1rem;
            max-width: 800px;
            color: #909090;
        }
        /* SECTION */
        .section {
            padding: 2rem 0;
        }
        .section-title {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
        }
        .section-title::before {
            content: "◆";
            color: #ff0055;
            font-size: 1.2rem;
        }
        /* CARD */
        .card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            padding: 1.8rem;
            margin-bottom: 1.5rem;
            border-left: 4px solid #ff0055;
            transition: border-color 0.3s;
        }
        .card h3 {
            margin-top: 0;
        }
        .card p:last-child {
            margin-bottom: 0;
        }
        /* FAQ 아코디언 스타일 */
        .faq-item {
            border-bottom: 1px solid #2a2a2a;
            padding: 1rem 0;
        }
        .faq-question {
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #d0d0d0;
            transition: color 0.2s;
        }
        .faq-question:hover {
            color: #ff0055;
        }
        .faq-question::after {
            content: "+";
            font-size: 1.4rem;
            color: #ff0055;
            transition: transform 0.3s;
        }
        .faq-item.active .faq-question::after {
            content: "−";
            transform: rotate(180deg);
        }
        .faq-answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, padding 0.3s ease;
            padding: 0 0.5rem;
        }
        .faq-item.active .faq-answer {
            max-height: 300px;
            padding: 0.8rem 0.5rem;
        }
        .faq-answer p {
            margin-bottom: 0.5rem;
            color: #a0a0a0;
        }
        /* METHODOLOGY TABLE */
        .method-table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
        }
        .method-table th,
        .method-table td {
            border: 1px solid #2a2a2a;
            padding: 0.8rem 1rem;
            text-align: left;
        }
        .method-table th {
            background: #1f1f1f;
            color: #ff0055;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
        }
        .method-table td {
            background: #151515;
            color: #c0c0c0;
        }
        /* FOOTER */
        footer {
            background: #0d0d0d;
            border-top: 2px solid #2a2a2a;
            padding: 2rem 0;
            margin-top: auto;
            text-align: center;
        }
        footer p {
            font-size: 0.85rem;
            color: #606060;
            margin-bottom: 0.3rem;
        }
        footer a {
            color: #00e5ff;
        }
        /* 반응형 - 패턴 responsive-768 */
        @media (max-width: 768px) {
            .container {
                padding: 0 1rem;
            }
            h1 {
                font-size: 2rem;
                border-left-width: 4px;
                padding-left: 0.8rem;
            }
            nav {
                flex-direction: column;
                align-items: stretch;
            }
            nav ul {
                justify-content: center;
                gap: 0.8rem;
            }
            .logo {
                text-align: center;
                font-size: 1.4rem;
            }
            .card {
                padding: 1.2rem;
            }
            .method-table th,
            .method-table td {
                padding: 0.5rem;
                font-size: 0.85rem;
            }
        }
        /* 전화번호 링크 스타일 - 패턴 tel-link */
        a[href^="tel:"] {
            color: #00e5ff;
            font-weight: 700;
            border-bottom: 2px solid #00e5ff;
        }
        a[href^="tel:"]:hover {
            color: #ff0055;
            border-bottom-color: #ff0055;
        }
        /* 유틸리티 */
        .text-muted {
            color: #707070;
        }
        .mt-2 {
            margin-top: 2rem;
        }
        .mb-1 {
            margin-bottom: 1rem;
        }
        .highlight {
            color: #ff0055;
            font-weight: 700;
        }
    </style>
</head>

                </ul>
</body>
